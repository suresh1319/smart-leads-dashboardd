version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: smart-leads
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-leads-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/smart-leads?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_change_in_production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost
    depends_on:
      - mongodb
    networks:
      - smart-leads-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smart-leads-network

volumes:
  mongo_data:

networks:
  smart-leads-network:
    driver: bridge
